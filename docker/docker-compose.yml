services:

  postgres:
    image: postgres:17

    container_name: quantforge_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: quantforge
      POSTGRES_DB: quantforge

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: quantforge_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: